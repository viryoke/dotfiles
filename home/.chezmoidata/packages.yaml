packages:
  linux:
    # Common packages for all Linux hosts (desktop and server/VM)
    pacman:
      - "git"
      - "neovim"
      - "lazygit"
      - "github-cli"
      - "ripgrep"
      - "fd"
      - "fzf"
      - "eza"
      - "zoxide"
      - "bat"
      - "yazi"
      - "zellij"
      - "jq"
      - "curl"
      - "wget"
      - "unzip"
      - "htop"
      - "btop"
      - "tree"
      - "tailscale"
    # Desktop-only packages (GUI, input methods)
    pacman_desktop:
      - "flatpak"
      - "fcitx5"
      - "fcitx5-rime"
      - "fcitx5-configtool"
      - "fcitx5-gtk"
      - "fcitx5-chinese-addons"
    # GUI applications via Flatpak (desktop-only)
    flatpak:
      - "org.mozilla.firefox"
      - "org.telegram.desktop"
      - "com.spotify.Client"
      - "com.discordapp.Discord"
      - "net.ankiweb.Anki"
      - "md.obsidian.Obsidian"
    # AUR packages (amd64-only, gated in orchest script)
    aur:
      - "baidunetdisk-bin"
  darwin:
    brews:
      - "git"
      - "neovim"
      - "lazygit"
      - "gh"
      - "ripgrep"
      - "fd"
      - "fzf"
      - "eza"
      - "zoxide"
      - "bat"
      - "yazi"
      - "zellij"
      - "jq"
      - "tree"
      - "gnu-sed"
      - "coreutils"
      - "fish"
    casks:
      - "google-chrome"
      - "alacritty"
      - "telegram"
      - "clash-verge-rev"
      - "baidunetdisk"
      - "obsidian"
      - "raycast"
      - "tailscale"
      - "stats"
